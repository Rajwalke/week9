<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>
<style>
    .main {
        display: flex;
        justify-content: space-around;
        align-items: flex-start;
        height: 100vh;
    }

    .left .right {
        border: 1px solid black;
    }
</style>

<body>
    <div class="main">
        <div class="left" id="allnotes">
            <!-- Show all notes -->
            Loading...
        </div>
        <div class="right">
            <!-- Input section -->
            <input id="userInput">
            <button onclick="addnotes()">ADD</button>
        </div>
    </div>

</body>
<script>
    // add notes from frontend to backend
    async function addnotes() {
        const userInput = document.getElementById('userInput').value;
        const api = await axios('http://localhost:4000/notes', {
            method: "POST",
            data: {
                note: userInput
            },
            headers: {
                "token": localStorage.getItem('token')
            }
        })
        userInput.value = "";
        showallNotes();
        alert("Note is added");
    }

    async function showallNotes() {
        const allNotes = document.getElementById('allnotes');
        const api = await axios('http://localhost:4000/notes', {
            method: "GET",
            headers: {
                "token": localStorage.getItem('token')
            }
        })
        const res = api.data.allnotes;
        if (res.length >= 1) {
            allNotes.innerHTML = '';
        }
        res.forEach(note => {
            const div = document.createElement('div');
            div.innerHTML = note.note;
            allNotes.appendChild(div);
        });
        console.log("ALL NOTES SHOWN")

    }
    showallNotes();
</script>

</html>
